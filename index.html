              </select>
            </div>
          ))}
        </div>

        {form.replication==='1' && (
          <>
            <div className="divider" />
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
              <div style={{ fontSize:14, fontWeight:600, color:'var(--ink-mid)' }}>🔁 復刻記錄</div>
              <button className="btn btn-outline btn-xs" onClick={addReplica}>+ 新增復刻</button>
            </div>
            {(form.replicas||[]).length===0 && <div style={{ fontSize:13, color:'var(--ink-light)', marginBottom:8 }}>尚無復刻記錄</div>}
            {(form.replicas||[]).map((r,i)=>(
              <div key={r.id} style={{ background:'var(--cream)', border:'1px solid var(--border)', borderRadius:8, padding:'10px 12px', marginBottom:8 }}>
                <div style={{ display:'flex', justifyContent:'space-between', marginBottom:8 }}>
                  <span style={{ fontSize:14, fontWeight:600, color:'var(--ink-mid)' }}>第 {i+1} 次復刻</span>
                  <button className="btn btn-danger btn-xs" onClick={()=>delReplica(r.id)}>×</button>
                </div>
                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:8 }}>
                  {[['cnStart','🇨🇳 陸服開始'],['cnEnd','🇨🇳 陸服結束'],['twStart','🇹🇼 台服開始'],['twEnd','🇹🇼 台服結束']].map(([key,lbl])=>(
                    <div key={key} className="form-group" style={{ marginBottom:0 }}>
                      <label style={{ fontSize:13 }}>{lbl}</label>
                      <input value={r[key]||''} onChange={e=>updReplica(r.id,key,e.target.value)}
                        onBlur={e=>updReplica(r.id,key,normDT(e.target.value))}
                        placeholder="YYYY-MM-DD HH:MM" style={{ fontFamily:'monospace', fontSize:14 }} />
                    </div>
                  ))}
                </div>
                <div className="form-group" style={{ marginBottom:0 }}>
                  <label style={{ fontSize:13 }}>連結活動</label>
                  <select value={r.eventId||''} onChange={e=>updReplica(r.id,'eventId',e.target.value)} style={{ fontSize:14 }}>
                    <option value="">— 不連結 —</option>
                    {(events||[]).filter(ev=>ev.name).sort((a,b)=>(b.cnYear||'')>(a.cnYear||'')?1:-1).map(ev=>(
                      <option key={ev.id} value={ev.id}>{ev.cnYear?`[${ev.cnYear}] `:''}{ev.name}</option>
                    ))}
                  </select>
                </div>
              </div>
            ))}
          </>
        )}

        <div className="divider" />
        <div className="form-group"><label>備註</label><input value={form.notes||''} onChange={e=>f('notes',e.target.value)} placeholder="特殊說明…" /></div>
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>取消</button>
          <button className="btn btn-primary" onClick={()=>form.gachaname&&onSave(buildSave())}>儲存</button>
        </div>
      </div>
    </div>
  );
}


// ─── ACTIVE EVENTS TAB ───────────────────────────────────────────────────────

function daysLeft(dateStr) {
  if (!dateStr) return null;
  const diff = new Date(dateStr) - new Date(today());
  return Math.ceil(diff / 86400000);
}

function ActiveEventsTab({ activeEvents, setActiveEvents, events, stamina, setTab, items=[] }) {
  const [selectedId, setSelectedId] = useState(null);

  const active = activeEvents.filter(e => e.status !== 'closed');
  const closed = activeEvents.filter(e => e.status === 'closed');
  const currentEvent = activeEvents.find(e => e.id === selectedId);

  const saveEvent = (ev) => {
    setActiveEvents(prev => prev.map(e => e.id === ev.id ? ev : e));
  };
  const closeEvent  = (id) => { if (confirm('結案此活動？將移至封存區，仍可查看紀錄。')) setActiveEvents(prev => prev.map(e => e.id === id ? { ...e, status: 'closed' } : e)); };
  const reopenEvent = (id) => setActiveEvents(prev => prev.map(e => e.id === id ? { ...e, status: 'active' } : e));
  const removeTracking = (id) => { if (confirm('取消追蹤此活動？（進度資料將刪除）')) setActiveEvents(prev => prev.filter(e => e.id !== id)); };
  const updateEvent = (id, patch) => setActiveEvents(prev => prev.map(e => e.id === id ? { ...e, ...patch } : e));

  React.useEffect(() => {
    if (!selectedId && active.length > 0) setSelectedId(active[0].id);
  }, [active.length]);

  return (
    <div>
      {/* Sub-tab bar */}
      <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 14, alignItems: 'center' }}>
        {active.map(ev => {
          const dl = daysLeft(ev.endDate);
          const urgent = dl !== null && dl <= 3;
          return (
            <button key={ev.id} className={`tab-btn ${selectedId===ev.id?'active':''}`}
              style={{ position:'relative' }} onClick={() => setSelectedId(ev.id)}>
              {ev.name}
              {dl !== null && <span style={{ fontSize:12, marginLeft:4, color:urgent?'#ff6060':'var(--ink-light)' }}>({dl}天)</span>}
              {urgent && <span style={{ position:'absolute', top:4, right:4, width:6, height:6, borderRadius:'50%', background:'#ff4040' }} />}
            </button>
          );
        })}
        <button className="btn btn-outline btn-sm" onClick={() => setTab('events')}>← 從活動列表選取</button>
        {closed.length > 0 && <span style={{ fontSize:13, color:'var(--ink-light)' }}>封存 {closed.length} 個</span>}
      </div>

      {currentEvent && currentEvent.status === 'active' && (
        <ActiveEventPanel ev={currentEvent} updateEvent={updateEvent} closeEvent={closeEvent}
          removeTracking={removeTracking}
          naturalStamina={staminaAtTime(stamina.current, stamina.baseTime)}
          items={items} />
      )}

      {active.length === 0 && (
        <div className="card">
          <div className="empty">
            <div className="icon">🗓</div>
            <div>尚無追蹤中的活動</div>
            <div style={{ fontSize:14, color:'var(--ink-light)', marginTop:8 }}>
              請前往「📋 活動列表」，在每筆活動點選「+ 追蹤」即可開始追蹤進度。
            </div>
            <button className="btn btn-primary btn-sm" style={{ marginTop:10 }} onClick={() => setTab('events')}>前往活動列表</button>
          </div>
        </div>
      )}

      {closed.length > 0 && (
        <div className="card">
          <div className="card-title" style={{ fontSize:15 }}><span className="icon">📦</span> 封存活動（已結束／已結案）</div>
          <div style={{ display:'flex', flexDirection:'column', gap:6 }}>
            {closed.map(ev => {
              const dl = daysLeft(ev.endDate);
              const past = dl !== null && dl < 0;
              return (
                <div key={ev.id} style={{ display:'flex', alignItems:'center', gap:10, padding:'8px 12px', background:'var(--cream)', borderRadius:8, border:'1px solid var(--border)', opacity:0.75, cursor:'pointer' }}
                  onClick={() => { setSelectedId(ev.id); reopenEvent(ev.id); }}>
                  <span style={{ flex:1, fontSize:15, fontWeight:500 }}>{ev.name}</span>
                  {ev.endDate && <span style={{ fontSize:13, color:past?'var(--rose)':'var(--ink-light)' }}>{past?'已過期 ':'結束 '}{fmtDate(ev.endDate)}</span>}
                  <span style={{ fontSize:13, color:'var(--ink-light)' }}>點擊重開查看</span>
                  <button className="btn btn-danger btn-xs" onClick={e=>{e.stopPropagation();removeTracking(ev.id);}}>移除</button>
                </div>
              );
            })}
          </div>
        </div>
      )}

    </div>
  );
}

// ─── ACTIVE EVENT PANEL (inline, no modal) ──────────────────────────────────

function ActiveEventPanel({ ev, updateEvent, closeEvent, removeTracking, naturalStamina, items=[] }) {
  const id = ev.id;
  const dl = daysLeft(ev.endDate);

  // ── Calculations ──────────────────────────────────────────────────────────
  const bonusSelf    = parseFloat(ev.bonusSelf)   || 0;
  const bonusFriend  = parseFloat(ev.bonusFriend) || 0;
  const multiplierEff = Math.max(bonusSelf + bonusFriend, parseFloat(ev.multiplier)||0);

  const stages = ev.stages || [];
  const stagesWithRatio = stages.map(s => {
    const reward   = parseFloat(s.rewardNormal) || 0;
    const rewardEff = reward * (1 + multiplierEff);
    const stamCost  = parseFloat(s.stamina) || 1;
    return { ...s, rewardEff, ratio: rewardEff / stamCost };
  });
  const bestStage = stagesWithRatio.reduce((b, s) => (!b || s.ratio > b.ratio) ? s : b, null);

  const shopItems = ev.shopItems || [];
  const itemWant  = (it) => parseInt(it.want) > 0 ? parseInt(it.want) : (parseInt(it.limit)||0);
  const wantItems = shopItems.filter(it => !it.skip);
  const totalTarget = wantItems.reduce((s, it) => s + (parseInt(it.cost)||0) * itemWant(it), 0);
  const totalNeeded = wantItems.reduce((s, it) => s + (parseInt(it.cost)||0) * Math.max(0, itemWant(it) - (parseInt(it.purchased)||0)), 0);
  const totalBought = wantItems.reduce((s, it) => s + (parseInt(it.cost)||0) * Math.min(parseInt(it.purchased)||0, itemWant(it)), 0);
  const shopPct     = totalTarget > 0 ? Math.round(totalBought / totalTarget * 100) : 0;
  const currHave    = parseInt(ev.currentCurrency) || 0;
  const stillNeed   = Math.max(0, totalNeeded - currHave);

  const runsNeeded  = bestStage && bestStage.rewardEff > 0 ? Math.ceil(stillNeed / bestStage.rewardEff) : null;
  const stamNeeded  = runsNeeded != null ? runsNeeded * (parseFloat(bestStage.stamina)||0) : null;
  const dailyRuns   = (runsNeeded != null && dl > 0) ? Math.ceil(runsNeeded / dl) : null;
  const dailyStam   = (stamNeeded != null && dl > 0) ? Math.ceil(stamNeeded / dl) : null;
  const DAILY_NATURAL = 513;
  const naturalTotal  = dl > 0 ? dl * DAILY_NATURAL : 0;
  const stamGap       = stamNeeded != null ? Math.max(0, stamNeeded - naturalTotal) : 0;
  const potionNeeded  = stamGap > 0 ? Math.ceil(stamGap / 60) : 0;
  const minDailyRuns  = parseInt(ev.dailyMinRuns) || 0;
  const minDailyStage = stages.find(s => s.id === ev.dailyMinStageId);
  const minDailyStam  = minDailyStage ? minDailyRuns * (parseFloat(minDailyStage.stamina)||0) : 0;

  const todayKey = today();
  const todayLog = ev.dailyLog?.[todayKey] || { runs: 0 };
  const logRuns  = (val) => updateEvent(id, { dailyLog: { ...(ev.dailyLog||{}), [todayKey]: { ...todayLog, runs: val } } });
  const onSchedule = dailyRuns != null && todayLog.runs >= dailyRuns;

  // ── Inline edit helpers (直接存，不用儲存鈕) ───────────────────────────────
  const upd  = (k, v) => updateEvent(id, { [k]: v });
  const updBonusSelf   = (pct) => upd('bonusSelf',   (parseFloat(pct)||0)/100);
  const updBonusFriend = (pct) => upd('bonusFriend', (parseFloat(pct)||0)/100);

  const addStage  = () => upd('stages', [...stages, { id: uid(), name: '', difficulty: 'I', stamina: '', rewardInit: '', rewardNormal: '', notes: '' }]);
  const updStage  = (sid, k, v) => upd('stages', stages.map(s => s.id===sid ? {...s,[k]:v} : s));
  const delStage  = (sid) => { if (confirm('刪除此副本？')) upd('stages', stages.filter(s => s.id!==sid)); };

  const addShopItem = () => upd('shopItems', [...shopItems, { id: uid(), name: '', cost: '', limit: '', want: '', purchased: '0', notes: '' }]);
  const updShop     = (sid, k, v) => upd('shopItems', shopItems.map(s => s.id===sid ? {...s,[k]:v} : s));
  const delShop     = (sid) => { if (confirm('刪除此品項？')) upd('shopItems', shopItems.filter(s => s.id!==sid)); };
  const updateShopPurchased = (sid, val) => {
    const it = shopItems.find(x => x.id===sid);
    if (!it) return;
    const wnt = itemWant(it);
    updShop(sid, 'purchased', String(Math.max(0, wnt > 0 ? Math.min(wnt, val) : val)));
  };

  // 道具庫選項
  const shopChoices = items.filter(x => x.shopVisible !== false);
  const grouped = shopChoices.reduce((acc, x) => { const t=x.item_type||'/'; if(!acc[t])acc[t]=[]; acc[t].push(x); return acc; }, {});

  return (
    <div style={{ display:'grid', gridTemplateColumns:'1fr 400px', gap:14, alignItems:'start' }}>

      {/* ══ LEFT: 計算結果 ════════════════════════════════════════════════════ */}
      <div>

        {/* ⚡ 體力計算（置頂） */}
        <div className="card">
          <div className="card-title"><span className="icon">⚡</span> 體力規劃</div>

          {/* 貨幣 + 缺口 summary */}
          <div className="stats-row" style={{ marginBottom:10 }}>
            <div className="stat-box">
              <div className="val">{currHave.toLocaleString()}</div>
              <div className="lbl">持有{ev.currencyName||'貨幣'}</div>
            </div>
            <div className="stat-box gold">
              <div className="val">{totalNeeded.toLocaleString()}</div>
              <div className="lbl">商店還需</div>
            </div>
            <div className={`stat-box ${stillNeed===0?'green':''}`}>
              <div className="val" style={{ color: stillNeed===0?'var(--sage)':'var(--rose)' }}>{stillNeed.toLocaleString()}</div>
              <div className="lbl">尚缺貨幣</div>
            </div>
            {runsNeeded != null && <div className="stat-box"><div className="val">{runsNeeded}</div><div className="lbl">需刷場次</div></div>}
            {stamNeeded != null && <div className="stat-box gold"><div className="val">{stamNeeded.toLocaleString()}</div><div className="lbl">需體力合計</div></div>}
          </div>

          {/* 缺口分析 */}
          {stamNeeded != null && dl > 0 && (
            <div style={{ padding:'10px 14px', background: stamGap>0?'rgba(196,132,122,0.1)':'rgba(100,180,120,0.1)', borderRadius:8, border:`1px solid ${stamGap>0?'rgba(196,132,122,0.3)':'rgba(100,180,120,0.3)'}`, marginBottom:10, fontSize:14 }}>
              <div style={{ display:'flex', gap:16, flexWrap:'wrap', alignItems:'center' }}>
                <span>🗓 剩 <strong>{dl}</strong> 天</span>
                <span>⚡ 自然回復 <strong>{naturalTotal.toLocaleString()}</strong></span>
                <span>🎯 需要 <strong>{stamNeeded.toLocaleString()}</strong></span>
                {stamGap > 0
                  ? <span style={{ color:'var(--rose)', fontWeight:700 }}>❌ 缺 {stamGap.toLocaleString()} ≈ 補 <strong>{potionNeeded}</strong> 瓶</span>
                  : <span style={{ color:'var(--sage)', fontWeight:700 }}>✅ 自然體力充足</span>}
                {dailyRuns != null && <span>📅 每日 <strong>{dailyRuns}</strong> 場 / <strong>{dailyStam}</strong> 體</span>}
              </div>
            </div>
          )}

          {/* 今日打卡 */}
          <div style={{ display:'flex', alignItems:'center', gap:8, flexWrap:'wrap', marginBottom:8 }}>
            <span style={{ fontSize:14, color:'var(--ink-mid)', flexShrink:0 }}>今日場次：</span>
            <button className="btn btn-outline btn-xs" onClick={() => logRuns(Math.max(0,todayLog.runs-1))}>−</button>
            <input type="number" min="0" value={todayLog.runs}
              onChange={e => logRuns(parseInt(e.target.value)||0)}
              style={{ width:56, textAlign:'center', fontWeight:700 }} />
            <button className="btn btn-gold btn-xs" onClick={() => logRuns(todayLog.runs+1)}>+</button>
            {dailyRuns != null && (
              <span className={`badge ${onSchedule?'badge-sage':'badge-rose'}`}>
                {onSchedule ? `✓ 達標 ${dailyRuns}` : `⚠ ${todayLog.runs}/${dailyRuns}`}
              </span>
            )}
            {naturalStamina != null && dailyStam != null && (
              <span style={{ fontSize:13, color: naturalStamina<dailyStam?'var(--rose)':'var(--sage)' }}>
                今日剩餘體力 {naturalStamina}
                {naturalStamina < dailyStam ? ` (缺 ${dailyStam-naturalStamina})` : ' ✓'}
              </span>
            )}
          </div>

          {/* 目前持有貨幣 input */}
          <div style={{ display:'flex', alignItems:'center', gap:8 }}>
            <label style={{ fontSize:14, color:'var(--ink-mid)', flexShrink:0 }}>持有{ev.currencyName||'貨幣'}：</label>
            <input type="number" min="0" value={ev.currentCurrency||''} placeholder="0"
              onChange={e => upd('currentCurrency', e.target.value)}
              style={{ width:100, textAlign:'center', fontWeight:700 }} />
          </div>
        </div>

        {/* ⚔ 副本效率 */}
        {stages.length > 0 && (
          <div className="card">
            <div className="card-title"><span className="icon">⚔</span> 副本效率比較</div>
            <div className="tbl-wrap">
              <table>
                <thead><tr>
                  <th>副本</th><th>難度</th><th>體力</th>
                  <th style={{ textAlign:'right' }}>通常獎勵</th>
                  {multiplierEff > 0 && <th style={{ textAlign:'right' }}>有效獲得</th>}
                  <th style={{ textAlign:'right' }}>比值</th>
                  <th style={{ textAlign:'right' }}>需刷場次</th>
                </tr></thead>
                <tbody>
                  {stagesWithRatio.map(s => {
                    const isBest = bestStage && s.id === bestStage.id;
                    const sRuns  = bestStage && bestStage.rewardEff > 0 && stillNeed > 0
                      ? (s.rewardEff > 0 ? Math.ceil(stillNeed / s.rewardEff) : null) : null;
                    return (
                      <tr key={s.id} style={isBest?{background:'rgba(212,175,106,0.15)',fontWeight:600}:{}}>
                        <td>{s.name}{isBest&&<span className="badge badge-gold" style={{marginLeft:4,fontSize:10}}>最優</span>}</td>
                        <td>{s.difficulty}</td>
                        <td style={{ textAlign:'right' }}>×{s.stamina}</td>
                        <td style={{ textAlign:'right' }}>{s.rewardNormal||'—'}</td>
                        {multiplierEff > 0 && <td style={{ textAlign:'right', color:'var(--gold)' }}>{s.rewardEff.toFixed(1)}</td>}
                        <td style={{ textAlign:'right', color:isBest?'var(--gold)':'inherit', fontWeight:isBest?700:400 }}>{s.ratio.toFixed(3)}</td>
                        <td style={{ textAlign:'right', color: sRuns?'var(--ink-mid)':'var(--ink-light)', fontSize:14 }}>{sRuns!=null?`${sRuns}場`:'—'}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        )}

        {/* 🏪 商店進度 */}
        {shopItems.length > 0 && (
          <div className="card">
            <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
              <div className="card-title" style={{ marginBottom:0 }}><span className="icon">🏪</span> 商店兌換進度</div>
              <span style={{ fontSize:13, color:'var(--ink-light)' }}>完成度 {shopPct}%</span>
            </div>
            <div style={{ background:'rgba(0,0,0,0.08)', borderRadius:4, height:5, overflow:'hidden', marginBottom:12 }}>
              <div style={{ background:shopPct>=100?'var(--sage)':'var(--gold)', width:`${shopPct}%`, height:'100%', transition:'width 0.4s' }} />
            </div>
            <div className="tbl-wrap">
              <table>
                <thead><tr>
                  <th style={{ width:28 }}>買?</th>
                  <th>商品</th>
                  <th style={{ textAlign:'right' }}>單價</th>
                  <th style={{ textAlign:'right' }}>目標</th>
                  <th style={{ textAlign:'right' }}>已兌換</th>
                  <th style={{ textAlign:'right' }}>還缺貨幣</th>
                  <th style={{ textAlign:'right' }}>還需場次</th>
                  <th style={{ minWidth:70 }}>進度</th>
                </tr></thead>
                <tbody>
                  {shopItems.map(it => {
                    const wnt     = itemWant(it);
                    const pur     = Math.min(parseInt(it.purchased)||0, wnt||99999);
                    const cost    = parseInt(it.cost)||0;
                    const remCost = Math.max(0, wnt-pur) * cost;
                    const pct     = wnt > 0 ? Math.round(pur/wnt*100) : 0;
                    const done    = pur >= wnt && wnt > 0;
                    const skipped = !!it.skip;
                    const iRuns   = bestStage && bestStage.rewardEff>0 && remCost>0 ? Math.ceil(remCost/bestStage.rewardEff) : null;
                    return (
                      <tr key={it.id} style={{ opacity:skipped?0.35:done?0.65:1, background:done&&!skipped?'rgba(100,180,120,0.06)':undefined }}>
                        <td style={{ textAlign:'center' }}>
                          <input type="checkbox" checked={!skipped}
                            onChange={e => updShop(it.id, 'skip', !e.target.checked)} />
                        </td>
                        <td style={{ fontWeight:500, textDecoration:skipped?'line-through':'none' }}>
                          {done&&!skipped&&<span style={{ color:'var(--sage)' }}>✓ </span>}{it.name}
                        </td>
                        <td style={{ textAlign:'right', color:'var(--ink-light)', fontSize:13 }}>{cost||'—'}</td>
                        <td style={{ textAlign:'right', fontSize:13 }}>{wnt||'—'}</td>
                        <td style={{ textAlign:'right' }}>
                          <div style={{ display:'flex', alignItems:'center', gap:3, justifyContent:'flex-end' }}>
                            <button className="btn btn-outline btn-xs" style={{ padding:'0 5px' }}
                              onClick={() => updateShopPurchased(it.id, pur-1)}>−</button>
                            <input type="number" min="0" value={parseInt(it.purchased)||0}
                              onChange={e => updateShopPurchased(it.id, parseInt(e.target.value)||0)}
                              style={{ width:44, textAlign:'center', fontSize:14, padding:'2px 4px' }} />
                            <button className="btn btn-gold btn-xs" style={{ padding:'0 5px' }}
                              onClick={() => updateShopPurchased(it.id, pur+1)}>+</button>
                            {!done&&!skipped&&<button className="btn btn-outline btn-xs" style={{ padding:'0 4px', fontSize:12 }}
                              onClick={() => updateShopPurchased(it.id, wnt)}>✓全</button>}
                          </div>
                        </td>
                        <td style={{ textAlign:'right', color:skipped?'var(--ink-light)':remCost>0?'var(--rose)':'var(--sage)', fontWeight:600 }}>
                          {skipped?'—':remCost>0?remCost.toLocaleString():'✓'}
                        </td>
                        <td style={{ textAlign:'right', fontSize:14, color:skipped||!iRuns?'var(--ink-light)':'var(--gold)', fontWeight:iRuns?600:400 }}>
                          {skipped||done?'—':iRuns!=null?`${iRuns}場`:'—'}
                        </td>
                        <td>
                          {!skipped&&(
                            <div style={{ display:'flex', alignItems:'center', gap:5 }}>
                              <div style={{ flex:1, height:5, background:'rgba(0,0,0,0.1)', borderRadius:3, overflow:'hidden', minWidth:40 }}>
                                <div style={{ width:`${pct}%`, height:'100%', background:done?'var(--sage)':'var(--gold)', borderRadius:3 }} />
                              </div>
                              <span style={{ fontSize:12, color:'var(--ink-light)', flexShrink:0 }}>{pur}/{wnt}</span>
                            </div>
                          )}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
                <tfoot>
                  <tr style={{ borderTop:'2px solid var(--border)', fontWeight:700, background:'rgba(0,0,0,0.04)' }}>
                    <td colSpan={4} style={{ fontSize:14 }}>合計</td>
                    <td style={{ textAlign:'right', color:'var(--ink-mid)' }}>{totalBought.toLocaleString()}</td>
                    <td style={{ textAlign:'right', color:totalNeeded>0?'var(--rose)':'var(--sage)' }}>{totalNeeded.toLocaleString()}</td>
                    <td style={{ textAlign:'right', color:runsNeeded?'var(--gold)':'var(--sage)', fontSize:14 }}>{runsNeeded!=null?`${runsNeeded}場`:'—'}</td>
                    <td />
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        )}
      </div>

      {/* ══ RIGHT: 設定（inline，直接存） ════════════════════════════════════ */}
      <div>
        <div className="card">
          {/* 標題列 */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:14 }}>
            <div>
              <div className="card-title" style={{ marginBottom:2 }}><span className="icon">⚙</span> 活動設定</div>
              <div style={{ fontSize:13, color:'var(--ink-light)' }}>修改即時生效，無需儲存</div>
            </div>
            <div style={{ display:'flex', gap:6 }}>
              <button className="btn btn-outline btn-xs" onClick={() => closeEvent(id)}>📦 結案</button>
              <button className="btn btn-danger btn-xs" onClick={() => removeTracking(id)}>🗑</button>
            </div>
          </div>

          {/* 基本資訊 */}
          <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:8, marginBottom:10 }}>
            <div className="form-group" style={{ marginBottom:0 }}>
              <label>活動名稱</label>
              <input value={ev.name||''} onChange={e => upd('name', e.target.value)} placeholder="活動名稱" />
            </div>
            <div className="form-group" style={{ marginBottom:0 }}>
              <label>結束日期</label>
              <input type="date" value={ev.endDate||''} onChange={e => upd('endDate', e.target.value)} />
            </div>
            <div className="form-group" style={{ marginBottom:0 }}>
              <label>貨幣名稱</label>
              <input value={ev.currencyName||''} onChange={e => upd('currencyName', e.target.value)} placeholder="e.g. 電磁能量管" />
            </div>
            <div className="form-group" style={{ marginBottom:0 }}>
              <label>每日最低場次</label>
              <div style={{ display:'flex', gap:6 }}>
                <input type="number" min="0" value={ev.dailyMinRuns||''} placeholder="0"
                  onChange={e => upd('dailyMinRuns', e.target.value)} style={{ width:60 }} />
                <select value={ev.dailyMinStageId||''} onChange={e => upd('dailyMinStageId', e.target.value)} style={{ flex:1, fontSize:14 }}>
                  <option value="">— 副本 —</option>
                  {stages.map(s => <option key={s.id} value={s.id}>{s.name} {s.difficulty}</option>)}
                </select>
              </div>
            </div>
          </div>

          {/* 加成設定 */}
          <div style={{ background:'rgba(212,175,106,0.08)', border:'1px solid rgba(212,175,106,0.25)', borderRadius:8, padding:'8px 12px', marginBottom:12 }}>
            <div style={{ fontSize:13, fontWeight:600, color:'var(--gold)', marginBottom:6 }}>✨ 加倍加成</div>
            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 80px', gap:8, alignItems:'end' }}>
              <div className="form-group" style={{ marginBottom:0 }}>
                <label style={{ fontSize:12 }}>自己 %（SSR突破）</label>
                <input type="number" step="1" min="0" max="100"
                  value={Math.round((parseFloat(ev.bonusSelf)||0)*100)||''}
                  onChange={e => updBonusSelf(e.target.value)} placeholder="0" />
              </div>
              <div className="form-group" style={{ marginBottom:0 }}>
                <label style={{ fontSize:12 }}>好友 %</label>
                <input type="number" step="1" min="0" max="100"
                  value={Math.round((parseFloat(ev.bonusFriend)||0)*100)||''}
                  onChange={e => updBonusFriend(e.target.value)} placeholder="0" />
              </div>
              <div style={{ textAlign:'center', padding:'6px 0', fontWeight:700, color:'var(--gold)', fontSize:18 }}>
                +{(multiplierEff*100).toFixed(0)}%
              </div>
            </div>
          </div>

          <div className="divider" />

          {/* ⚔ 副本清單 */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
            <div style={{ fontSize:14, fontWeight:600, color:'var(--ink-mid)' }}>⚔ 副本清單</div>
            <button className="btn btn-outline btn-xs" onClick={addStage}>+ 新增</button>
          </div>
          {stages.length === 0 && <div style={{ fontSize:13, color:'var(--ink-light)', marginBottom:8 }}>尚未設定副本</div>}
          {stages.map((s, i) => (
            <div key={s.id} style={{ marginBottom:6 }}>
              {i === 0 && (
                <div style={{ display:'grid', gridTemplateColumns:'2fr 44px 44px 60px 60px 28px', gap:4, marginBottom:2 }}>
                  {['副本名','難度','體力','初次','通常',''].map((h,j) => (
                    <label key={j} style={{ fontSize:10, color:'var(--ink-light)' }}>{h}</label>
                  ))}
                </div>
              )}
              <div style={{ display:'grid', gridTemplateColumns:'2fr 44px 44px 60px 60px 28px', gap:4, alignItems:'center' }}>
                <input value={s.name} onChange={e => updStage(s.id,'name',e.target.value)} placeholder="副本名" style={{ fontSize:14 }} />
                <input value={s.difficulty} onChange={e => updStage(s.id,'difficulty',e.target.value)} placeholder="I" style={{ fontSize:14 }} />
                <input type="number" min="0" value={s.stamina} onChange={e => updStage(s.id,'stamina',e.target.value)} placeholder="10" style={{ fontSize:14 }} />
                <input type="number" min="0" value={s.rewardInit||''} onChange={e => updStage(s.id,'rewardInit',e.target.value)} placeholder="—" style={{ fontSize:14 }} />
                <input type="number" min="0" value={s.rewardNormal||''} onChange={e => updStage(s.id,'rewardNormal',e.target.value)} placeholder="60" style={{ fontSize:14 }} />
                <button className="btn btn-danger btn-xs" onClick={() => delStage(s.id)}>×</button>
              </div>
            </div>
          ))}

          <div className="divider" />

          {/* 🏪 商店品項 */}
          <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:8 }}>
            <div style={{ fontSize:14, fontWeight:600, color:'var(--ink-mid)' }}>🏪 商店品項</div>
            <button className="btn btn-outline btn-xs" onClick={addShopItem}>+ 新增</button>
          </div>
          {shopItems.length === 0 && <div style={{ fontSize:13, color:'var(--ink-light)', marginBottom:8 }}>尚未設定商店品項</div>}
          {shopItems.map(it => (
            <div key={it.id} style={{ marginBottom:8, padding:'8px 10px', background:'var(--cream)', borderRadius:8, border:'1px solid var(--border)' }}>
              <div style={{ display:'flex', gap:6, marginBottom:6, alignItems:'center' }}>
                <SearchSelect
                  value=""
                  onChange={itemId => {
                    if (!itemId) return;
                    const p = shopChoices.find(x => x.id===itemId);
                    if (p) updShop(it.id, 'name', p.item_name);
                  }}
                  placeholder="── 從道具庫選取 ──"
                  options={shopChoices.map(x=>({ value:x.id, label:`[${x.item_type||'/'}] ${x.item_name}` }))}
                  style={{ flex:1, fontSize:13 }} />
                <button className="btn btn-danger btn-xs" onClick={() => delShop(it.id)}>×</button>
              </div>
              <input value={it.name||''} onChange={e => updShop(it.id,'name',e.target.value)}
                placeholder="或直接輸入名稱" style={{ fontSize:14, width:'100%', boxSizing:'border-box', marginBottom:6 }} />
              <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr 1fr', gap:6 }}>
                <div>
                  <label style={{ fontSize:10, color:'var(--ink-light)' }}>單價</label>
                  <input type="number" min="0" value={it.cost||''} onChange={e => updShop(it.id,'cost',e.target.value)}
                    placeholder="單價" style={{ fontSize:14, width:'100%', boxSizing:'border-box' }} />
                </div>
                <div>
                  <label style={{ fontSize:10, color:'var(--ink-light)' }}>上限</label>
                  <input type="number" min="0" value={it.limit||''} onChange={e => updShop(it.id,'limit',e.target.value)}
                    placeholder="上限" style={{ fontSize:14, width:'100%', boxSizing:'border-box' }} />
                </div>
                <div>
                  <label style={{ fontSize:10, color:'var(--rose)' }}>我要買</label>
                  <input type="number" min="0" value={it.want||''} onChange={e => updShop(it.id,'want',e.target.value)}
                    placeholder="目標數" style={{ fontSize:14, width:'100%', boxSizing:'border-box', background:'rgba(196,132,122,0.08)', border:'1px solid rgba(196,132,122,0.35)' }} />
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>

    </div>
  );
}



// ─── ITEMS TAB (道具庫) ──────────────────────────────────────────────────────
const ITEM_CSV_KEYS = ['item_type','item_link','item_ld','item_pic','item_name','item_de','item_get','item_comment','item_order'];
const ITEM_TYPE_COLORS = {
  '/': '#aaa',
  '貨幣': '#d4af6a', '培養': '#7bc47b', '功能': '#6ab4d4', '禮物': '#d47bac',
  '特定突破': '#c47bc4', '電影院': '#7b9cd4', '主線門票': '#d4a07b', '實體憑證': '#b07bd4',
};

function ItemsTab({ items, setItems }) {
  const [filterMajor, setFilterMajor] = useState('全部');
  const [search, setSearch] = useState('');
  const [modal, setModal] = useState(null);
  const [sortKey, setSortKey] = useState('item_order');
  const importRef = useRef();

  const [filterYear,  setFilterYear]  = useState('全部');
  const [filterSub,   setFilterSub]   = useState('全部');

  // ── 分類函式 ──────────────────────────────────────────────────────────────
  const getMajor = (t) => {
    if ((t||'').startsWith('活動')) return '活動';
    if ((t||'').startsWith('培養')) return '培養';
    if ((t||'').startsWith('功能')) return '功能';
    if ((t||'').startsWith('特定突破')) return '培養';
    if ((t||'').startsWith('盒子')) return '盒子';
    if ((t||'') === '禮物') return '禮物';
    if ((t||'') === '貨幣') return '貨幣';
    return '其他';  // 電影院、主線門票、實體憑證、/、其他
  };
  const getYear = (t) => { const m=(t||'').match(/^活動(\d{4})/); return m?m[1]:''; };
  const getSub  = (t, major) => {
    if (major==='活動') { const p=t.split('/'); return p.length>1?p[1]:''; }
    if (major==='培養') {
      if (t.startsWith('特定突破')) { const p=t.split('-'); return p.length>1?'特定突破-'+p[1]:'特定突破'; }
      const p=t.split('-'); return p.length>1?p[1]:'';
    }
    if (major==='功能') { const p=t.split('-'); return p.length>1?p[1]:''; }
    if (major==='盒子') { const p=t.split('/'); return p.length>1?p[1]:''; }
    if (major==='其他') { if (!t||t==='/') return '其他'; return ['電影院','主線門癈','實體憑證'].includes(t)?t:''; }
    return '';
  };

  // ── 各列固定選項（永遠全顯示，同卡池） ─────────────────────────────────────
  const ALL_MAJORS = ['全部','培養','活動','功能','盒子','禮物','貨幣','其他'];
  const ALL_YEARS  = ['全部','2020','2021','2022','2023','2024','2025','2026'];
  const majorCount = (m) => m==='全部' ? items.length : items.filter(x=>getMajor(x.item_type)===m).length;

  // 細分：依大類+年份動態，但列永遠顯示
  const subsForMajor = filterMajor==='全部' ? [] :
    [...new Set(items
      .filter(x => getMajor(x.item_type)===filterMajor)
      .filter(x => filterYear==='全部' || getYear(x.item_type)===filterYear)
      .map(x => getSub(x.item_type, filterMajor))
      .filter(Boolean)
    )].sort((a,b)=>a.localeCompare(b,'zh'));

  // ── 篩選結果 ──────────────────────────────────────────────────────────────
  const filtered = items
    .filter(it => filterMajor==='全部' || getMajor(it.item_type)===filterMajor)
    .filter(it => filterYear==='全部' || getYear(it.item_type)===filterYear)
    .filter(it => filterSub==='全部' || getSub(it.item_type, filterMajor)===filterSub)
    .filter(it => !search || [it.item_name, it.item_ld, it.item_type, it.item_de].some(v => (v||'').includes(search)))
    .sort((a, b) => {
      const av = a[sortKey]||'', bv = b[sortKey]||'';
      if (sortKey === 'item_order') return (parseInt(av)||0) - (parseInt(bv)||0);
      return av.localeCompare(bv, 'zh');
    });

  const selectMajor = (m) => { setFilterMajor(m); setFilterYear('全部'); setFilterSub('全部'); };
  const selectYear  = (y) => { setFilterYear(y); setFilterSub('全部'); };

  // ── 批次商店開關 ──────────────────────────────────────────────────────────
  const [shopToast, setShopToast] = useState(null);
  const batchToggleShop = (val) => {
    const ids = new Set(filtered.map(x => x.id));
    const count = ids.size;
    setItems(prev => prev.map(x => ids.has(x.id) ? { ...x, shopVisible: val } : x));
    setShopToast({ val, count });
    setTimeout(() => setShopToast(null), 2000);
  };
  const filteredShopAll = filtered.length > 0 && filtered.every(x => x.shopVisible === true);

  const save = (item) => {
    if (item.id) setItems(prev => prev.map(x => x.id === item.id ? item : x));
    else setItems(prev => [...prev, { ...item, id: uid() }]);
    setModal(null);
  };
  const del = (id) => { if (confirm('確定刪除此道具？')) setItems(prev => prev.filter(x => x.id !== id)); };

  const downloadTemplate = () => downloadCSV('道具庫模板.csv', '\uFEFF' + ITEM_CSV_KEYS.join(','));

  const handleImport = async (e) => {
    const file = e.target.files[0]; if (!file) return;
    e.target.value = '';
    try {
      const text = await readCSVFile(file);
      const rows = parseCSV(text);
      const g = (r, ...keys) => { for (const k of keys) { const v = (r[k]!=null?r[k]:r[k.toLowerCase()]; if (v !== undefined && v !== '') return v; } return ''; };
      const newItems = rows.map(r => ({
        id: uid(),
        item_type:    g(r,'item_type')    || '/',
        item_link:    g(r,'item_link')    || '0',
        item_ld:      g(r,'item_ld')      || '',
        item_pic:     g(r,'item_pic')     || '',
        item_name:    g(r,'item_name')    || '未命名',
        item_de:      g(r,'item_de')      || '',
        item_get:     g(r,'item_get')     || '/',
        item_comment: g(r,'item_comment') || '',
        item_order:   g(r,'item_order')   || '',
      }));
      if (confirm(`確定匯入 ${newItems.length} 筆道具？（新增至現有庫）`)) {
        setItems(prev => [...prev, ...newItems]);
        alert(`✅ 成功匯入 ${newItems.length} 筆道具`);
      }
    } catch(err) { console.error(err); alert('❌ CSV 格式有誤'); }
  };

  const handleExport = () => {
    if (items.length === 0) { alert('尚無道具資料'); return; }
    const rows = items.map(it => ({
      item_type: it.item_type||'', item_link: it.item_link||'', item_ld: it.item_ld||'',
      item_pic: it.item_pic||'', item_name: it.item_name||'', item_de: it.item_de||'',
      item_get: it.item_get||'', item_comment: it.item_comment||'', item_order: it.item_order||'',
    }));
    downloadCSV('道具庫匯出.csv', '\uFEFF' + toCSV(rows, ITEM_CSV_KEYS));
  };

  const TypeBadge = ({ type }) => {
    const col = ITEM_TYPE_COLORS[type] || '#aaa';
    return <span style={{ fontSize: 12, padding: '1px 7px', borderRadius: 10, background: col+'22', border: `1px solid ${col}88`, color: col, fontWeight: 600 }}>{type||'/'}</span>;
  };

  return (
    <div>
      <div className="card">
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', marginBottom:12, flexWrap:'wrap', gap:10 }}>
          <div className="card-title" style={{ marginBottom:0 }}><span className="icon">🗂</span> 道具庫管理</div>
          <div style={{ display:'flex', gap:6, flexWrap:'wrap' }}>
            <button className="btn btn-outline btn-sm" onClick={downloadTemplate}>📄 下載模板</button>
            <input ref={importRef} type="file" accept=".csv" style={{ display:'none' }} onChange={handleImport} />
            <button className="btn btn-outline btn-sm" onClick={() => importRef.current.click()}>📥 匯入CSV</button>
            <button className="btn btn-outline btn-sm" onClick={handleExport}>⬇ 匯出CSV</button>
            <button className="btn btn-primary btn-sm" onClick={() => setModal({ item_link:'0', item_get:'/' })}>+ 新增道具</button>
          </div>
        </div>

        {/* Row1：大類 */}
        <div style={{ display:'flex', gap:6, marginBottom:8, flexWrap:'wrap', alignItems:'center' }}>
          <span style={{ fontSize:13, color:'var(--ink-light)', flexShrink:0, minWidth:36 }}>大類</span>
          {ALL_MAJORS.map(m => (
            <button key={m} className={`btn btn-xs ${filterMajor===m?'btn-primary':'btn-outline'}`}
              onClick={() => selectMajor(m)}>
              {m}{m!=='全部'?' ×'+majorCount(m):''}
            </button>
          ))}
        </div>
        {/* Row2：年份 */}
        <div style={{ display:'flex', gap:6, marginBottom:8, flexWrap:'wrap', alignItems:'center' }}>
          <span style={{ fontSize:13, color:'var(--ink-light)', flexShrink:0, minWidth:36 }}>年份</span>
          {(() => {
            const yearsInMajor = new Set(items.filter(x=>filterMajor==='全部'||getMajor(x.item_type)===filterMajor).map(x=>getYear(x.item_type)).filter(Boolean));
            const hasYears = yearsInMajor.size > 0;
            if (!hasYears) return <span style={{ fontSize:13, color:'var(--ink-light)' }}>— 此分類無年份區分</span>;
            return ALL_YEARS.map(y => {
              const avail = y==='全部' || yearsInMajor.has(y);
              return <button key={y}
                className={`btn btn-xs ${filterYear===y?'btn-primary':'btn-outline'}`}
                style={{ opacity: avail?1:0.35, cursor: avail?'pointer':'default' }}
                onClick={() => avail && selectYear(y)}>{y}</button>;
            });
          })()}
        </div>
        {/* Row3：細分（永遠顯示，無選項時灰掉） */}
        <div style={{ display:'flex', gap:6, marginBottom:subsForMajor.length>0?8:14, flexWrap:'wrap', alignItems:'center' }}>
          <span style={{ fontSize:13, color:'var(--ink-light)', flexShrink:0, minWidth:36 }}>細分</span>
          {subsForMajor.length === 0
            ? <span style={{ fontSize:13, color:'var(--ink-light)' }}>— 請先選擇大類</span>
            : <>
                <button className={`btn btn-xs ${filterSub==='全部'?'btn-gold':'btn-outline'}`} onClick={()=>setFilterSub('全部')}>全部</button>
                {subsForMajor.map(s => (
                  <button key={s} className={`btn btn-xs ${filterSub===s?'btn-gold':'btn-outline'}`}
                    onClick={() => setFilterSub(filterSub===s?'全部':s)}>{s}</button>
                ))}
              </>
          }
        </div>
        {/* 結果數 + 商店批次 */}
        <div style={{ display:'flex', gap:8, alignItems:'center', marginBottom:14, flexWrap:'wrap' }}>
          <span style={{ fontSize:14, color:'var(--ink-light)' }}>顯示 {filtered.length} / {items.length} 筆</span>
          <button className="btn btn-xs btn-outline"
            style={{ color: filteredShopAll?'var(--sage)':'var(--ink-light)', borderColor: filteredShopAll?'var(--sage)':'var(--border)' }}
            onClick={() => batchToggleShop(!filteredShopAll)}>
            🛒 {filteredShopAll ? `篩選${filtered.length}筆全開 → 點此全關` : `篩選${filtered.length}筆全關 → 點此全開`}
          </button>
          {shopToast && (
            <span style={{ fontSize:13, fontWeight:600, padding:'3px 8px', borderRadius:6,
              background: shopToast.val ? 'rgba(100,180,120,0.15)' : 'rgba(180,180,180,0.15)',
              color: shopToast.val ? 'var(--sage)' : 'var(--ink-light)',
              border: `1px solid ${shopToast.val ? 'var(--sage)' : 'var(--border)'}` }}>
              {shopToast.val ? `✓ 已將 ${shopToast.count} 筆設為商店可見` : `✓ 已將 ${shopToast.count} 筆設為隱藏`}
            </span>
          )}
        </div>

        {/* 搜尋 */}
        <div style={{ display:'flex', gap:8, marginBottom:12 }}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="搜尋道具名稱、編號、描述…" style={{ flex:1 }} />
          {search && <button className="btn btn-outline btn-sm" onClick={() => setSearch('')}>✕</button>}
        </div>

        {/* 表格 */}
        {filtered.length === 0 ? (
          <div className="empty"><div className="icon">🗂</div><div>尚無道具資料，請匯入 CSV 或手動新增</div></div>
        ) : (
          <div className="tbl-wrap">
            <table>
              <thead>
                <tr>
                  <th style={{ cursor:'pointer' }} onClick={() => setSortKey('item_order')}>#序{sortKey==='item_order'?' ▲':''}</th>
                  <th>類型</th>
                  <th style={{ cursor:'pointer' }} onClick={() => setSortKey('item_name')}>道具名稱{sortKey==='item_name'?' ▲':''}</th>
                  <th>編號(item_ld)</th>
                  <th>圖片</th>
                  <th>描述</th>
                  <th>獲取方式</th>
                  <th>連結</th>
                  <th>注釋</th>
                  <th style={{ textAlign:'center', width:50 }} title="顯示在活動商店下拉選單">🛒商店</th>
                  <th style={{ width:70 }}></th>
                </tr>
              </thead>
              <tbody>
                {filtered.map(it => (
                  <tr key={it.id}>
                    <td style={{ textAlign:'right', color:'var(--ink-light)', fontSize:13 }}>{it.item_order||'—'}</td>
                    <td><TypeBadge type={it.item_type} /></td>
                    <td style={{ fontWeight:600 }}>{it.item_name}</td>
                    <td style={{ fontSize:13, color:'var(--ink-light)', fontFamily:'monospace' }}>{it.item_ld}</td>
                    <td style={{ fontSize:13, color:'var(--ink-light)' }}>{it.item_pic||'—'}</td>
                    <td style={{ fontSize:13, color:'var(--ink-mid)', maxWidth:160, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{it.item_de}</td>
                    <td style={{ fontSize:13, color:'var(--ink-light)' }}>{it.item_get}</td>
                    <td style={{ fontSize:13, textAlign:'center' }}>{it.item_link==='1'?'🔗':'—'}</td>
                    <td style={{ fontSize:13, color:'var(--ink-light)', maxWidth:120, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{it.item_comment}</td>
                    <td style={{ textAlign:'center' }}>
                      <input type="checkbox" checked={it.shopVisible === true}
                          onChange={e => setItems(prev => prev.map(x => x.id===it.id ? {...x, shopVisible: e.target.checked} : x))}
                          title={it.shopVisible === true ? '顯示在商店下拉' : '已隱藏'} />
                    </td>
                    <td>
                      <div style={{ display:'flex', gap:4 }}>
                        <button className="btn btn-outline btn-xs" onClick={() => setModal({...it})}>✎</button>
                        <button className="btn btn-danger btn-xs" onClick={() => del(it.id)}>×</button>
                      </div>
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
      {modal !== null && <ItemModal item={modal} onSave={save} onClose={() => setModal(null)} />}
    </div>
  );
}

function ItemModal({ item, onSave, onClose }) {
  const [form, setForm] = useState({
    item_type:'/', item_link:'0', item_ld:'', item_pic:'',
    item_name:'', item_de:'', item_get:'/', item_comment:'', item_order:'',
    ...item
  });
  const f = (k, v) => setForm(p => ({ ...p, [k]: v }));

  const PRESET_TYPES = ['/','貨幣','培養-xx','功能-xx','禮物','特定突破-xx','電影院','主線門票','實體憑證'];

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{ maxWidth:600 }} onClick={e => e.stopPropagation()}>
        <div className="modal-title">{form.id ? '✎ 編輯道具' : '+ 新增道具'}</div>

        <div className="form-row col2">
          <div className="form-group">
            <label>item_type（道具類型）</label>
            <input value={form.item_type||''} onChange={e=>f('item_type',e.target.value)} placeholder="貨幣 / 培養-xx / /" />
            <div style={{ display:'flex', gap:4, flexWrap:'wrap', marginTop:5 }}>
              {PRESET_TYPES.map(t => (
                <button key={t} type="button" className={`btn btn-xs ${form.item_type===t?'btn-primary':'btn-outline'}`}
                  onClick={() => f('item_type', t)}>{t}</button>
              ))}
            </div>
          </div>
          <div className="form-group">
            <label>item_order（序號）</label>
            <input type="number" value={form.item_order||''} onChange={e=>f('item_order',e.target.value)} placeholder="排序用" />
          </div>
        </div>

        <div className="form-row col2">
          <div className="form-group">
            <label>item_name（道具名稱）*</label>
            <input value={form.item_name||''} onChange={e=>f('item_name',e.target.value)} placeholder="顯示名稱" />
          </div>
          <div className="form-group">
            <label>item_ld（道具編號）</label>
            <input value={form.item_ld||''} onChange={e=>f('item_ld',e.target.value)} placeholder="e.g. 初級突破箱（隨機）" />
          </div>
        </div>

        <div className="form-row col2">
          <div className="form-group">
            <label>item_pic（圖片）</label>
            <input value={form.item_pic||''} onChange={e=>f('item_pic',e.target.value)} placeholder="圖片檔名" />
          </div>
          <div className="form-group">
            <label>item_link（連結）</label>
            <select value={form.item_link||'0'} onChange={e=>f('item_link',e.target.value)}>
              <option value="0">0 — 無連結</option>
              <option value="1">1 — 連結至道具名</option>
            </select>
          </div>
        </div>

        <div className="form-group">
          <label>item_de（道具描述）</label>
          <textarea value={form.item_de||''} onChange={e=>f('item_de',e.target.value)} placeholder="浮窗顯示的說明文" rows={2} />
        </div>

        <div className="form-row col2">
          <div className="form-group">
            <label>item_get（獲取方式）</label>
            <input value={form.item_get||''} onChange={e=>f('item_get',e.target.value)} placeholder="無獲取方式填 /" />
          </div>
          <div className="form-group">
            <label>item_comment（編輯注釋）</label>
            <input value={form.item_comment||''} onChange={e=>f('item_comment',e.target.value)} placeholder="可標注實裝日期等" />
          </div>
        </div>

        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>取消</button>
          <button className="btn btn-primary" onClick={() => form.item_name && onSave(form)}>儲存</button>
        </div>
      </div>
    </div>
  );
}

// ─── SPENDING TAB ────────────────────────────────────────────────────────────
const SPEND_CATS = ['月卡','鑽石禮包','體力禮包','覺悟禮包','服裝','特殊邀約','周年/節慶禮包','抽卷','其他'];
const CAT_COLORS = {'月卡':'#e8f0fd','鑽石禮包':'#fdeaea','體力禮包':'#eaf5ea','覺悟禮包':'#f5eaf8','服裝':'#fef9ed','特殊邀約':'#fde8f5','周年/節慶禮包':'#fff3e0','抽卷':'#e0f7fa','其他':'#f5f5f5'};
const CAT_BORDER = {'月卡':'#80a8e8','鑽石禮包':'#e89090','體力禮包':'#80c880','覺悟禮包':'#c8a0d8','服裝':'#d4af6a','特殊邀約':'#e8a0c8','周年/節慶禮包':'#ffb74d','抽卷':'#4dd0e1','其他':'#ccc'};
const BASELINE_DIAMOND = 0.0463;
const BASELINE_STAMINA = 0.211;

function SpendingTab({ spending, setSpending, spendBudget, setSpendBudget, cpAwakenRef, setCpAwakenRef }) {
  const [subTab, setSubTab] = useState('overview');
  const [modal, setModal] = useState(null);
  const [filterCat, setFilterCat] = useState('全部');
  const [viewMonth, setViewMonth] = useState('');
  const [editBudget, setEditBudget] = useState(false);
  const [budgetInput, setBudgetInput] = useState('');
  const [cpPrice, setCpPrice] = useState('');
  const [cpDiamond, setCpDiamond] = useState('');
  const [cpStamina, setCpStamina] = useState('');
  const [cpAwaken, setCpAwaken] = useState('');
  const [cpDesc, setCpDesc] = useState('');

  const del = (id) => { if (confirm('確定刪除？')) setSpending(prev => prev.filter(s => s.id !== id)); };
  const save = (rec) => {
    if (rec.id) setSpending(prev => prev.map(s => s.id === rec.id ? rec : s));
    else setSpending(prev => [{ ...rec, id: uid() }, ...prev]);
    setModal(null);
  };

  const sortedSpending = [...spending].sort((a,b) => (b.date||'') > (a.date||'') ? 1 : -1);
  const allMonths = [...new Set(spending.map(r => r?.date.slice(0,7).filter(Boolean))].sort().reverse();
  const currentMonthStr = today().slice(0,7);
  const lastMonthStr = (() => { const d = new Date(); d.setMonth(d.getMonth()-1); return d.toISOString().slice(0,7); })();
  const totalSpent = spending.reduce((s,r) => s+(parseFloat(r.price)||0), 0);
  const thisMonthTotal = spending.filter(r => r?.date.slice(0,7===currentMonthStr).reduce((s,r) => s+(parseFloat(r.price)||0), 0);
  const lastMonthTotal = spending.filter(r => r?.date.slice(0,7===lastMonthStr).reduce((s,r) => s+(parseFloat(r.price)||0), 0);
  const monthlyBudget = parseFloat(spendBudget.monthly) || 0;
  const budgetUsedPct = monthlyBudget > 0 ? Math.min(100, Math.round(thisMonthTotal/monthlyBudget*100)) : 0;
  const budgetOver = monthlyBudget > 0 && thisMonthTotal > monthlyBudget;

  const monthlyTotals = allMonths.slice(0,12).map(m => ({
    month: m, label: m.slice(5)+'月',
    total: spending.filter(r => r?.date.slice(0,7===m).reduce((s,r) => s+(parseFloat(r.price)||0), 0),
  }));
  const maxMonthly = Math.max(...monthlyTotals.map(m => m.total), 1);

  const catTotals = SPEND_CATS.map(c => ({
    cat: c,
    total: spending.filter(r => r.category===c).reduce((s,r) => s+(parseFloat(r.price)||0), 0),
    count: spending.filter(r => r.category===c).length,
  })).filter(c => c.total>0).sort((a,b) => b.total-a.total);

  const displayed = sortedSpending.filter(r => {
    if (filterCat!=='全部' && r.category!==filterCat) return false;
    if (viewMonth && r?.date.slice(0,7!==viewMonth) return false;
    return true;
  });
  const displayedTotal = displayed.reduce((s,r) => s+(parseFloat(r.price)||0), 0);

  const cpVal = (() => {
    const price = parseFloat(cpPrice); if (!price) return null;
    const d=parseFloat(cpDiamond)||0, st=parseFloat(cpStamina)||0, aw=parseFloat(cpAwaken)||0, awRef=parseFloat(cpAwakenRef)||0;
    const refVal = d*BASELINE_DIAMOND + st*BASELINE_STAMINA + (awRef>0 ? aw*awRef : 0);
    const ratio = refVal>0 ? (refVal/price*100).toFixed(1) : null;
    return { refVal:refVal.toFixed(1), ratio,
      perDiamond: d>0?(price/d).toFixed(4):null,
      perStamina: st>0?(price/st).toFixed(3):null,
      perAwaken:  aw>0&&awRef>0?(price/aw).toFixed(2):null };
  })();

  const exportCSV = () => {
    const keys = ['date','name','category','price','diamonds','stamina','awakening','outfit','invite','other','notes'];
    downloadCSV('課金明細.csv', toCSV(sortedSpending, keys));
  };

  return (
    <div>
      <div style={{ display:'flex', gap:6, marginBottom:14, borderBottom:'1px solid var(--border)', paddingBottom:10 }}>
        {[{id:'overview',label:'📊 總覽'},{id:'detail',label:'📒 明細'},{id:'cp',label:'📐 CP計算'}].map(t => (
          <button key={t.id} className={`btn btn-sm ${subTab===t.id?'btn-primary':'btn-outline'}`} onClick={()=>setSubTab(t.id)}>{t.label}</button>
        ))}
        <button className="btn btn-primary btn-sm" style={{marginLeft:'auto'}} onClick={()=>setModal({date:today(),category:'其他'})}>+ 新增記帳</button>
      </div>

      {subTab==='overview' && (
        <div>
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
              <div className="card-title" style={{marginBottom:0}}><span className="icon">💰</span> 課金總覽</div>
              <button className="btn btn-outline btn-xs" onClick={()=>{setBudgetInput(spendBudget.monthly||'');setEditBudget(true);}}>⚙ 月預算</button>
            </div>
            <div className="stats-row" style={{marginBottom:12}}>
              <div className="stat-box gold"><div className="val">NT${Math.round(totalSpent).toLocaleString()}</div><div className="lbl">歷史累計</div></div>
              <div className="stat-box"><div className="val">NT${Math.round(thisMonthTotal).toLocaleString()}</div><div className="lbl">本月（{currentMonthStr.slice(5)}月）</div></div>
              <div className="stat-box" style={{opacity:lastMonthTotal>0?1:0.4}}><div className="val">NT${Math.round(lastMonthTotal).toLocaleString()}</div><div className="lbl">上月</div></div>
              {allMonths.length>1 && <div className="stat-box"><div className="val">NT${Math.round(totalSpent/allMonths.length).toLocaleString()}</div><div className="lbl">月均</div></div>}
            </div>
            {monthlyBudget>0 && (
              <div>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:14,marginBottom:4}}>
                  <span style={{color:budgetOver?'var(--rose)':'var(--ink-mid)'}}>{budgetOver?'⚠ 本月已超出預算':'本月預算進度'}</span>
                  <span style={{fontWeight:700,color:budgetOver?'var(--rose)':'var(--gold)'}}>NT${Math.round(thisMonthTotal).toLocaleString()} / NT${monthlyBudget.toLocaleString()}（{budgetUsedPct}%）</span>
                </div>
                <div style={{background:'rgba(0,0,0,0.08)',borderRadius:4,height:8,overflow:'hidden'}}>
                  <div style={{width:`${budgetUsedPct}%`,height:'100%',borderRadius:4,background:budgetUsedPct>=100?'var(--rose)':budgetUsedPct>=80?'#e08000':'var(--gold)',transition:'width 0.4s'}} />
                </div>
                {!budgetOver && <div style={{fontSize:13,color:'var(--ink-light)',marginTop:4}}>剩餘：NT${Math.round(monthlyBudget-thisMonthTotal).toLocaleString()}</div>}
              </div>
            )}
          </div>

          {monthlyTotals.length>0 && (
            <div className="card">
              <div className="card-title"><span className="icon">📈</span> 月度花費趨勢</div>
              <div style={{display:'flex',alignItems:'flex-end',gap:6,height:110,padding:'0 4px'}}>
                {[...monthlyTotals].reverse().map(m => {
                  const h = Math.round((m.total/maxMonthly)*84);
                  const isThis = m.month===currentMonthStr;
                  return (
                    <div key={m.month} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:3,cursor:'pointer'}}
                      onClick={()=>{setSubTab('detail');setViewMonth(m.month);}}>
                      <div style={{fontSize:10,color:'var(--ink-light)',fontWeight:isThis?700:400}}>
                        {m.total>0?`NT$${m.total>=1000?Math.round(m.total/1000)+'k':m.total}`:''}
                      </div>
                      <div style={{width:'100%',height:Math.max(h,2),background:isThis?'var(--gold)':'var(--gold-light)',borderRadius:'3px 3px 0 0',opacity:isThis?1:0.6}} />
                      <div style={{fontSize:10,color:isThis?'var(--gold)':'var(--ink-light)',fontWeight:isThis?700:400,whiteSpace:'nowrap'}}>{m.label}</div>
                    </div>
                  );
                })}
              </div>
              <div style={{fontSize:13,color:'var(--ink-light)',marginTop:6}}>點擊月份可跳至該月明細</div>
            </div>
          )}

          {catTotals.length>0 && (
            <div className="card">
              <div className="card-title"><span className="icon">🗂</span> 類別分析</div>
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {catTotals.map(c => {
                  const pct = totalSpent>0?Math.round(c.total/totalSpent*100):0;
                  return (
                    <div key={c.cat} style={{cursor:'pointer'}} onClick={()=>{setSubTab('detail');setFilterCat(c.cat);setViewMonth('');}}>
                      <div style={{display:'flex',justifyContent:'space-between',fontSize:14,marginBottom:3}}>
                        <span style={{fontWeight:600}}>{c.cat}<span style={{fontWeight:400,color:'var(--ink-light)',marginLeft:6}}>{c.count}筆</span></span>
                        <span style={{fontWeight:700,color:'var(--gold)'}}>NT${Math.round(c.total).toLocaleString()} <span style={{color:'var(--ink-light)',fontWeight:400}}>({pct}%)</span></span>
                      </div>
                      <div style={{background:'rgba(0,0,0,0.07)',borderRadius:3,height:5,overflow:'hidden'}}>
                        <div style={{width:`${pct}%`,height:'100%',background:CAT_BORDER[c.cat]||'var(--gold)',borderRadius:3}} />
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {spending.length===0 && <div className="card"><div className="empty"><div className="icon">💸</div><div>尚無課金記錄</div></div></div>}

          {editBudget && (
            <div className="modal-overlay" onClick={()=>setEditBudget(false)}>
              <div className="modal" style={{maxWidth:360}} onClick={e=>e.stopPropagation()}>
                <div className="modal-title">⚙ 月預算設定</div>
                <div className="form-group"><label>每月預算上限（NT$，填 0 表示不設限）</label>
                  <input type="number" min="0" value={budgetInput} onChange={e=>setBudgetInput(e.target.value)} autoFocus /></div>
                <div className="modal-footer">
                  <button className="btn btn-outline" onClick={()=>setEditBudget(false)}>取消</button>
                  <button className="btn btn-primary" onClick={()=>{setSpendBudget({monthly:budgetInput});setEditBudget(false);}}>儲存</button>
                </div>
              </div>
            </div>
          )}
        </div>
      )}

      {subTab==='detail' && (
        <div className="card">
          <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
            <span style={{fontSize:13,color:'var(--ink-light)',flexShrink:0}}>類別：</span>
            {['全部',...SPEND_CATS].map(c=>(
              <button key={c} className={`btn btn-xs ${filterCat===c?'btn-primary':'btn-outline'}`} onClick={()=>setFilterCat(c)}>{c}</button>
            ))}
          </div>
          {allMonths.length>0 && (
            <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
              <span style={{fontSize:13,color:'var(--ink-light)',flexShrink:0}}>月份：</span>
              <button className={`btn btn-xs ${!viewMonth?'btn-primary':'btn-outline'}`} onClick={()=>setViewMonth('')}>全部</button>
              {allMonths.map(m=>(
                <button key={m} className={`btn btn-xs ${viewMonth===m?'btn-primary':'btn-outline'}`} onClick={()=>setViewMonth(viewMonth===m?'':m)}>{m}</button>
              ))}
            </div>
          )}
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <span style={{fontSize:14,color:'var(--ink-light)'}}>顯示 {displayed.length} 筆 · 合計 <strong style={{color:'var(--gold)'}}>NT${Math.round(displayedTotal).toLocaleString()}</strong></span>
            <button className="btn btn-outline btn-xs" onClick={exportCSV}>⬇ 匯出CSV</button>
          </div>
          {displayed.length===0 ? (
            <div className="empty"><div className="icon">💸</div><div>尚無符合條件的記錄</div></div>
          ) : (
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              {displayed.map(r => {
                const extras=[r.outfit,r.invite,r.other].filter(Boolean).join('・');
                return (
                  <div key={r.id} style={{background:CAT_COLORS[r.category]||'#f5f5f5',border:`1px solid ${CAT_BORDER[r.category]||'#ccc'}`,borderRadius:10,padding:'10px 14px'}}>
                    <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                      <div style={{flex:1}}>
                        <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3,flexWrap:'wrap'}}>
                          <span style={{fontWeight:700,fontSize:16}}>{r.name||'（未命名）'}</span>
                          <span className="badge badge-gray" style={{fontSize:12}}>{r.category}</span>
                        </div>
                        <div style={{display:'flex',gap:10,flexWrap:'wrap',fontSize:13,color:'var(--ink-light)',marginBottom:3}}>
                          <span>📅 {fmtDate(r.date)}</span>
                          {r.diamonds && <span>💎 {r.diamonds}鑽</span>}
                          {r.stamina && <span>⚡ {r.stamina}體</span>}
                          {r.awakening && <span>✦ {r.awakening}覺</span>}
                          {extras && <span>🎁 {extras}</span>}
                        </div>
                        {r.notes && <div style={{fontSize:13,color:'var(--ink-light)'}}>📝 {r.notes}</div>}
                      </div>
                      <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:6,marginLeft:10}}>
                        <span style={{fontWeight:700,fontSize:17,color:'var(--gold)',whiteSpace:'nowrap'}}>NT${parseFloat(r.price||0).toLocaleString()}</span>
                        <div style={{display:'flex',gap:4}}>
                          <button className="btn btn-outline btn-xs" onClick={()=>setModal({...r})}>編輯</button>
                          <button className="btn btn-danger btn-xs" onClick={()=>del(r.id)}>×</button>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}

      {subTab==='cp' && (
        <div className="card">
          <div className="card-title"><span className="icon">📐</span> 禮包 CP 值計算</div>
          <div style={{fontSize:13,color:'var(--ink-light)',marginBottom:12,background:'var(--cream)',borderRadius:6,padding:'6px 10px'}}>
            基準：鑽石 NT${BASELINE_DIAMOND}/顆（648鑽最小包）・體力 NT${BASELINE_STAMINA}/體（NT$19體包）<br/>
            覺悟石基準請自行設定（自動記憶）。服裝・特殊邀約等非量化項目不計入。
          </div>
          <div className="form-row col2">
            <div className="form-group"><label>禮包名稱（可選）</label><input value={cpDesc} onChange={e=>setCpDesc(e.target.value)} placeholder="e.g. 周年慶大禮包" /></div>
            <div className="form-group"><label>禮包價格（台幣）*</label><input type="number" value={cpPrice} onChange={e=>setCpPrice(e.target.value)} placeholder="e.g. 648" /></div>
          </div>
          <div className="form-row col2">
            <div className="form-group"><label>💎 鑽石數量</label><input type="number" min="0" value={cpDiamond} onChange={e=>setCpDiamond(e.target.value)} placeholder="0" /></div>
            <div className="form-group"><label>⚡ 體力數量</label><input type="number" min="0" value={cpStamina} onChange={e=>setCpStamina(e.target.value)} placeholder="0" /></div>
          </div>
          <div className="form-row col2">
            <div className="form-group"><label>✦ 覺悟石數量</label><input type="number" min="0" value={cpAwaken} onChange={e=>setCpAwaken(e.target.value)} placeholder="0" /></div>
            <div className="form-group"><label>✦ 覺悟石基準（NT$/顆）</label><input type="number" min="0" step="0.01" value={cpAwakenRef} onChange={e=>setCpAwakenRef(e.target.value)} placeholder="自行設定" /></div>
          </div>
          {cpVal && parseFloat(cpPrice)>0 && (
            <div>
              <div className="divider" />
              <div className="stats-row" style={{marginBottom:10}}>
                {cpVal.perDiamond && <div className="stat-box gold"><div className="val">{cpVal.perDiamond}</div><div className="lbl">NT$/鑽石</div></div>}
                {cpVal.perStamina && <div className="stat-box"><div className="val">{cpVal.perStamina}</div><div className="lbl">NT$/體力</div></div>}
                {cpVal.perAwaken && <div className="stat-box"><div className="val">{cpVal.perAwaken}</div><div className="lbl">NT$/覺悟石</div></div>}
              </div>
              {cpVal.ratio ? (
                <div className={parseFloat(cpVal.ratio)>=100?'result-surplus':'result-deficit'}>
                  {parseFloat(cpVal.ratio)>=100
                    ? `✓ CP優秀：等效基準價值 NT$${cpVal.refVal}（優於基準 ${cpVal.ratio}%）`
                    : `△ CP偏低：等效基準價值 NT$${cpVal.refVal}（僅達基準 ${cpVal.ratio}%）`}
                  {cpDesc && `・${cpDesc}`}
                </div>
              ) : (
                <div style={{fontSize:13,color:'var(--ink-light)'}}>填入數量欄位以計算等效 CP 值。</div>
              )}
              <button className="btn btn-outline btn-sm" style={{marginTop:12}}
                onClick={()=>{if(!cpPrice)return;setModal({date:today(),price:cpPrice,category:'鑽石禮包',diamonds:cpDiamond,stamina:cpStamina,awakening:cpAwaken,name:cpDesc});setSubTab('detail');}}>
                ＋ 記入課金明細
              </button>
            </div>
          )}
        </div>
      )}

      {modal!==null && <SpendingModal rec={modal} onSave={save} onClose={()=>setModal(null)} />}
    </div>
  );
}

function SpendingModal({ rec, onSave, onClose }) {
  const [form, setForm] = useState({
    date:today(), name:'', category:'其他', price:'',
    diamonds:'', stamina:'', awakening:'',
    outfit:'', invite:'', other:'', notes:'',
    ...rec
  });
  const f = (k,v) => setForm(p=>({...p,[k]:v}));
  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal" style={{maxWidth:620}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{form.id?'✎ 編輯課金記錄':'+ 新增課金記錄'}</div>
        <div className="form-row col2">
          <div className="form-group"><label>購買日期</label><input type="date" value={form.date} onChange={e=>f('date',e.target.value)} /></div>
          <div className="form-group"><label>禮包/項目名稱</label><input value={form.name} onChange={e=>f('name',e.target.value)} placeholder="e.g. 周年慶大禮包" /></div>
        </div>
        <div className="form-row col2">
          <div className="form-group"><label>類別</label>
            <select value={form.category} onChange={e=>f('category',e.target.value)}>
              {SPEND_CATS.map(c=><option key={c}>{c}</option>)}
            </select>
          </div>
          <div className="form-group"><label>實付金額（台幣）*</label><input type="number" min="0" value={form.price} onChange={e=>f('price',e.target.value)} placeholder="e.g. 648" /></div>
        </div>
        <div className="divider" />
        <div style={{fontSize:14,fontWeight:600,color:'var(--ink-mid)',marginBottom:8}}>✦ 獲得內容</div>
        <div className="form-row col3">
          <div className="form-group"><label>💎 鑽石</label><input type="number" min="0" value={form.diamonds} onChange={e=>f('diamonds',e.target.value)} placeholder="0" /></div>
          <div className="form-group"><label>⚡ 體力</label><input type="number" min="0" value={form.stamina} onChange={e=>f('stamina',e.target.value)} placeholder="0" /></div>
          <div className="form-group"><label>✦ 覺悟石</label><input type="number" min="0" value={form.awakening} onChange={e=>f('awakening',e.target.value)} placeholder="0" /></div>
        </div>
        <div className="form-row col3">
          <div className="form-group"><label>👗 服裝</label><input value={form.outfit} onChange={e=>f('outfit',e.target.value)} placeholder="服裝名稱" /></div>
          <div className="form-group"><label>💌 特殊邀約</label><input value={form.invite} onChange={e=>f('invite',e.target.value)} placeholder="邀約名稱" /></div>
          <div className="form-group"><label>其他內容</label><input value={form.other} onChange={e=>f('other',e.target.value)} placeholder="其他" /></div>
        </div>
        <div className="form-group"><label>備註</label><input value={form.notes} onChange={e=>f('notes',e.target.value)} placeholder="活動限定、購買原因…" /></div>
        <div className="modal-footer">
          <button className="btn btn-outline" onClick={onClose}>取消</button>
          <button className="btn btn-primary" onClick={()=>form.price&&onSave(form)}>儲存</button>
        </div>
      </div>
    </div>
  );
}


// ─── COLLECTION TAB ──────────────────────────────────────────────────────────
function CollectionTab({ collection, setCollection, cards=[], setCards }) {
  const [filterCardChar,    setFilterCardChar]    = useState('全部');
  const [filterCardRarity,  setFilterCardRarity]  = useState('全部');
  const [filterCardGetType, setFilterCardGetType] = useState('全部');
  const [filterCardOwned,   setFilterCardOwned]   = useState('全部');
  const [filterCardStory,   setFilterCardStory]   = useState('全部');
  const [filterCardYear,    setFilterCardYear]    = useState('全部');
  const [cardSortKey,   setCardSortKey]   = useState('sort');
  const [cardSortDir,   setCardSortDir]   = useState('asc');
  const [cardSearch,    setCardSearch]    = useState('');
  const [cardViewMode,  setCardViewMode]  = useState('table');
  const [cardModal,     setCardModal]     = useState(null);

  const updCard = (id, patch) => setCards(prev => prev.map(c => c.id===id ? {...c,...patch} : c));

  const cardYears      = ['全部',...Array.from(new Set(cards.map(c => (c.time||'').slice(0,4)).filter(Boolean))).sort()];
  const cardStoryTypes = ['全部',...Array.from(new Set(cards.map(c => c.story).filter(s => s && s !== '無')))];

  const filteredCards = cards
    .filter(c => filterCardChar    === '全部' || c.character === filterCardChar)
    .filter(c => filterCardRarity  === '全部' || c.rarity === filterCardRarity)
    .filter(c => filterCardGetType === '全部' || (c.getType||'').indexOf(filterCardGetType) >= 0)
    .filter(c => filterCardOwned   === '全部' || (filterCardOwned === '已擁有' ? c.owned : !c.owned))
    .filter(c => filterCardStory   === '全部' || c.story === filterCardStory)
    .filter(c => filterCardYear    === '全部' || (c.time||'').slice(0,4) === filterCardYear)
    .filter(c => !cardSearch || [c.name,c.character,c.keyword,c.get,c.tag,c.tcName,c.enName]
      .some(v => (v||'').toLowerCase().indexOf(cardSearch.toLowerCase()) >= 0))
    .sort((a,b) => {
      var av = a[cardSortKey] != null ? a[cardSortKey] : '';
      var bv = b[cardSortKey] != null ? b[cardSortKey] : '';
      if (['sort','hp','atk','df','cardCount'].indexOf(cardSortKey) >= 0) { av = parseInt(av)||0; bv = parseInt(bv)||0; }
      if (av < bv) return cardSortDir === 'asc' ? -1 : 1;
      if (av > bv) return cardSortDir === 'asc' ? 1 : -1;
      return 0;
    });

  const cardOwnedCount   = cards.filter(c => c.owned).length;
  const filteredAllOwned = filteredCards.length > 0 && filteredCards.every(c => c.owned);

  const batchToggleOwned = () => {
    var ids = new Set(filteredCards.map(c => c.id));
    var val = !filteredAllOwned;
    setCards(prev => prev.map(c => ids.has(c.id) ? {...c, owned: val} : c));
  };

  const handleCardSort = (k) => {
    if (cardSortKey === k) setCardSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setCardSortKey(k); setCardSortDir('asc'); }
  };

  const RarityBadge = function({r}) {
    var cls = {SSR:'badge-gold',SR:'badge-rose','SR+':'badge-rose',R:'badge-sage',N:'badge-gray','收藏':'badge-purple','生日':'badge-rose','紀念':'badge-blue','QQ卡':'badge-gray'};
    return <span className={'badge ' + (cls[r]||'badge-gray')} style={{fontSize:11}}>{r}</span>;
  };
  const CharBadge = function({ch}) {
    var col = CHAR_COLORS[ch];
    if (!col) return <span className="badge badge-gray" style={{fontSize:11}}>{ch}</span>;
    return <span style={{fontSize:11,padding:'2px 8px',borderRadius:20,background:col.bg,border:'1px solid '+col.border,color:col.color,fontWeight:600}}>{ch}</span>;
  };
  const CardSortTh = function({k, label, style}) {
    return (
      <th style={Object.assign({cursor:'pointer',userSelect:'none',color:cardSortKey===k?'var(--gold)':'var(--gold-light)'},style||{})}
        onClick={() => handleCardSort(k)}>
        {label}{cardSortKey===k ? (cardSortDir==='asc'?' ▲':' ▼') : ''}
      </th>
    );
  };

  var CARD_RARITIES_LIST  = ['N','R','SR','SR+','SSR','收藏','生日','紀念','QQ卡'];
  var CARD_CHARS_LIST     = ['艾因','路辰','羅夏','司嵐','葉瑄','其他'];
  var CARD_GET_TYPES_LIST = ['寫生獲取','活動獲取','活動畫廊','活動畫廊/活動獲取','限時累充','郵件領取','無法獲取'];

  return (
    <div>
      <div className="card">
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:14,flexWrap:'wrap',gap:8}}>
          <div className="card-title" style={{marginBottom:0}}><span className="icon">🎴</span> 卡面圖鑑</div>
          <div style={{display:'flex',gap:6}}>
            <button className={'btn btn-sm ' + (cardViewMode==='table'?'btn-primary':'btn-outline')} onClick={() => setCardViewMode('table')}>表格</button>
            <button className={'btn btn-sm ' + (cardViewMode==='grid'?'btn-primary':'btn-outline')} onClick={() => setCardViewMode('grid')}>卡片</button>
          </div>
        </div>

        <div className="stats-row" style={{marginBottom:12}}>
          <div className="stat-box" style={{cursor:'pointer',outline:filterCardOwned==='已擁有'?'2px solid var(--sage)':'none'}}
            onClick={() => setFilterCardOwned(f => f==='已擁有'?'全部':'已擁有')}>
            <div className="val" style={{color:'var(--sage)'}}>{cardOwnedCount}</div><div className="lbl">已擁有</div>
          </div>
          <div className="stat-box" style={{cursor:'pointer',outline:filterCardOwned==='未擁有'?'2px solid var(--rose)':'none'}}
            onClick={() => setFilterCardOwned(f => f==='未擁有'?'全部':'未擁有')}>
            <div className="val" style={{color:'var(--rose)'}}>{cards.length - cardOwnedCount}</div><div className="lbl">未擁有</div>
          </div>
          <div className="stat-box"><div className="val">{cards.length}</div><div className="lbl">全部</div></div>
          {['艾因','路辰','羅夏','司嵐','葉瑄'].map(ch => {
            var tot = cards.filter(c => c.character===ch).length;
            var own = cards.filter(c => c.character===ch && c.owned).length;
            return (
              <div key={ch} className="stat-box" style={{cursor:'pointer',outline:filterCardChar===ch?'2px solid var(--rose)':'none'}}
                onClick={() => setFilterCardChar(f => f===ch?'全部':ch)}>
                <div className="val" style={{fontSize:14}}>{own}/{tot}</div><div className="lbl">{ch}</div>
              </div>
            );
          })}
        </div>

        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(150px,1fr))',gap:8,marginBottom:14}}>
          {['艾因','路辰','羅夏','司嵐','葉瑄'].map(ch => {
            var col = CHAR_COLORS[ch];
            var tot = cards.filter(c => c.character===ch).length;
            var own = cards.filter(c => c.character===ch && c.owned).length;
            var pct = tot > 0 ? Math.round(own/tot*100) : 0;
            return (
              <div key={ch} style={{background:col?col.bg:'#eee',border:'1px solid '+(col?col.border:'#ccc'),borderRadius:10,padding:'10px 12px'}}>
                <div style={{fontWeight:700,color:col?col.color:'#333',marginBottom:4,fontSize:13}}>{ch} {pct}%</div>
                <div style={{fontSize:12,color:'var(--ink-mid)',marginBottom:4}}>{own} / {tot}</div>
                <div style={{background:'rgba(0,0,0,0.08)',borderRadius:4,height:5,overflow:'hidden'}}>
                  <div style={{background:col?col.color:'#666',width:pct+'%',height:'100%',borderRadius:4}}/>
                </div>
              </div>
            );
          })}
        </div>

        {[
          {label:'角色', opts:['全部'].concat(CARD_CHARS_LIST), val:filterCardChar, set:setFilterCardChar},
          {label:'稀有', opts:['全部'].concat(CARD_RARITIES_LIST), val:filterCardRarity, set:setFilterCardRarity},
          {label:'獲取', opts:['全部'].concat(CARD_GET_TYPES_LIST), val:filterCardGetType, set:setFilterCardGetType},
          {label:'劇情', opts:cardStoryTypes, val:filterCardStory, set:setFilterCardStory},
          {label:'年份', opts:cardYears, val:filterCardYear, set:setFilterCardYear},
        ].map(function(row) {
          return (
            <div key={row.label} style={{display:'flex',gap:5,marginBottom:7,flexWrap:'wrap',alignItems:'center'}}>
              <span style={{fontSize:12,color:'var(--ink-light)',flexShrink:0,minWidth:36}}>{row.label}</span>
              {row.opts.map(o => <button key={o} className={'btn btn-xs ' + (row.val===o?'btn-primary':'btn-outline')} onClick={() => row.set(o)}>{o}</button>)}
            </div>
          );
        })}

        <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:12,color:'var(--ink-light)',flexShrink:0,minWidth:36}}>擁有</span>
          {['全部','已擁有','未擁有'].map(o => <button key={o} className={'btn btn-xs ' + (filterCardOwned===o?'btn-primary':'btn-outline')} onClick={() => setFilterCardOwned(o)}>{o}</button>)}
        </div>
