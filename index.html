        <div style={{display:'flex',gap:8,marginBottom:12,alignItems:'center',flexWrap:'wrap'}}>
          <input value={cardSearch} onChange={e => setCardSearch(e.target.value)} placeholder="搜尋卡名、關鍵字、活動名…" style={{flex:1,minWidth:160}}/>
          {cardSearch && <button className="btn btn-outline btn-sm" onClick={() => setCardSearch('')}>✕</button>}
          <button className="btn btn-sm btn-outline"
            style={{color:filteredAllOwned?'var(--sage)':'var(--ink-light)',borderColor:filteredAllOwned?'var(--sage)':'var(--border)',whiteSpace:'nowrap'}}
            onClick={batchToggleOwned}>
            {filteredAllOwned ? filteredCards.length+'筆全擁有 → 取消' : filteredCards.length+'筆 → 全標擁有'}
          </button>
          <span style={{fontSize:12,color:'var(--ink-light)',flexShrink:0}}>顯示 {filteredCards.length} / {cards.length}</span>
        </div>

        {cardViewMode === 'table' && (
          <div className="tbl-wrap">
            <table>
              <thead><tr>
                <CardSortTh k="sort" label="#" style={{width:40}}/>
                <th style={{width:32,textAlign:'center'}}>擁有</th>
                <CardSortTh k="rarity" label="稀有"/>
                <CardSortTh k="character" label="角色"/>
                <CardSortTh k="name" label="卡名"/>
                <CardSortTh k="type" label="類型"/>
                <CardSortTh k="get" label="獲取活動"/>
                <CardSortTh k="getType" label="獲取方式"/>
                <CardSortTh k="time" label="時間"/>
                <CardSortTh k="cardCount" label="卡面"/>
                <th>劇情</th>
                <th>關鍵字</th>
                <th style={{width:36}}></th>
              </tr></thead>
              <tbody>
                {filteredCards.map(c => (
                  <tr key={c.id} style={{opacity:c.owned?1:0.6}}>
                    <td style={{color:'var(--ink-light)',fontSize:12}}>{c.sort}</td>
                    <td style={{textAlign:'center'}}><input type="checkbox" checked={!!c.owned} onChange={e => updCard(c.id,{owned:e.target.checked})}/></td>
                    <td><RarityBadge r={c.rarity}/></td>
                    <td><CharBadge ch={c.character}/></td>
                    <td style={{fontWeight:600,minWidth:80}}>{c.name}</td>
                    <td style={{fontSize:12,color:'var(--ink-light)'}}>{c.type}</td>
                    <td style={{fontSize:12,maxWidth:120}}>{c.get}</td>
                    <td style={{fontSize:12,color:'var(--ink-light)'}}>{c.getType}</td>
                    <td style={{fontSize:12,whiteSpace:'nowrap',color:'var(--ink-light)'}}>{c.time ? c.time.slice(0,7) : ''}</td>
                    <td style={{textAlign:'center',fontSize:12}}>{c.cardCount}</td>
                    <td style={{fontSize:12}}>{c.story && c.story !== '無' ? c.story : ''}</td>
                    <td style={{fontSize:11,color:'var(--ink-light)',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={c.keyword}>{c.keyword}</td>
                    <td><button className="btn btn-outline btn-xs" onClick={() => setCardModal({...c})}>✎</button></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}

        {cardViewMode === 'grid' && (
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(155px,1fr))',gap:10}}>
            {filteredCards.map(c => (
              <div key={c.id} onClick={() => setCardModal({...c})}
                style={{padding:'10px 12px',borderRadius:10,border:'2px solid '+(c.owned?'var(--gold)':'var(--border)'),
                  background:c.owned?'rgba(212,175,106,0.08)':'var(--cream)',
                  cursor:'pointer',opacity:c.owned?1:0.65}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
                  <RarityBadge r={c.rarity}/>
                  <input type="checkbox" checked={!!c.owned} onChange={e => { e.stopPropagation(); updCard(c.id,{owned:e.target.checked}); }}/>
                </div>
                <div style={{fontWeight:700,fontSize:13,marginBottom:3}}>{c.name}</div>
                <CharBadge ch={c.character}/>
                <div style={{fontSize:11,color:'var(--ink-light)',marginTop:4}}>{c.get}</div>
                {c.story && c.story !== '無' && <div style={{fontSize:11,color:'var(--sage)',marginTop:2}}>{c.story}</div>}
              </div>
            ))}
          </div>
        )}
      </div>

      {cardModal !== null && (
        <div className="modal-overlay" onClick={() => setCardModal(null)}>
          <div className="modal" style={{maxWidth:540}} onClick={e => e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
              <div className="modal-title" style={{marginBottom:0}}><RarityBadge r={cardModal.rarity}/> <span style={{marginLeft:8}}>{cardModal.name}</span></div>
              <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontWeight:600,color:cardModal.owned?'var(--sage)':'var(--rose)'}}>
                <input type="checkbox" checked={!!cardModal.owned} onChange={e => setCardModal(m => ({...m,owned:e.target.checked}))}/>
                {cardModal.owned ? '✓ 已擁有' : '未擁有'}
              </label>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,fontSize:13,marginBottom:12}}>
              {[['角色',cardModal.character],['稀有度',cardModal.rarity],['類型',cardModal.type],
                ['世界觀',cardModal.background],['獲取活動',cardModal.get],['獲取方式',cardModal.getType],
                ['卡面數',cardModal.cardCount],['劇情',cardModal.story !== '無' ? cardModal.story : '—'],
                ['HP',cardModal.hp],['ATK',cardModal.atk],['DEF',cardModal.df],
                ['陸服時間',cardModal.time ? cardModal.time.slice(0,10) : '']
              ].map(function(pair) {
                if (!pair[1]) return null;
                return <div key={pair[0]}><span style={{color:'var(--ink-light)',fontSize:11}}>{pair[0]}　</span><strong>{pair[1]}</strong></div>;
              })}
            </div>
            {cardModal.tag && cardModal.tag !== '無' && (
              <div style={{marginBottom:8}}>
                <span style={{fontSize:11,color:'var(--ink-light)'}}>Tag　</span>
                {cardModal.tag.split('/').map(t => <span key={t} className="badge badge-gray" style={{fontSize:11,marginRight:3}}>{t}</span>)}
              </div>
            )}
            {cardModal.keyword && <div style={{marginBottom:8,fontSize:12,color:'var(--ink-light)'}}><span style={{fontWeight:600}}>關鍵字　</span>{cardModal.keyword}</div>}
            <div className="form-group"><label>個人備註</label>
              <input value={cardModal.notes||''} onChange={e => setCardModal(m => ({...m,notes:e.target.value}))} placeholder="備註…"/></div>
            <div className="modal-footer">
              <button className="btn btn-outline" onClick={() => setCardModal(null)}>關閉</button>
              <button className="btn btn-primary" onClick={() => { setCards(prev => prev.map(c => c.id===cardModal.id ? cardModal : c)); setCardModal(null); }}>儲存</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
